<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>AutoFix</title>
  
    <!-- CSS links using Flask url_for -->
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='font-awesome.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='responsive.css') }}">
  </head>
  

<body>
  <div class="hero_area">
    <!-- header section strats -->
    <header class="header_section">
      <div class="header_top">
        <div class="container-fluid">
          <div class="contact_nav">
            <a class="navbar-brand" href="index.html">
              <span>
                AutoFix
              </span>
            </a>
          </div>
        </div>
      </div>
      <div class="header_bottom">
        <div class="container-fluid">
          <nav class="navbar navbar-expand-lg custom_nav-container ">
            

            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
              <span class=""> </span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
              <ul class="navbar-nav ">
                <li class="nav-item active">
                  <a class="nav-link" href="{{ url_for('index') }}">Home <span class="sr-only">(current)</span></a>
                </li>
                <li class="nav-item ">
                  <a class="nav-link" href="{{ url_for('about') }}">claim Estimation </a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="{{ url_for('service') }}">Heatmap</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="{{ url_for('contact') }}">Damage Assessment</a>
                </li>
              </ul>
            </div>
          </nav>
        </div>
      </div>
    </header>
    <!-- end header section -->
  </div>
  
  <section class="about_section layout_padding-bottom">
    <div class="container">
      <div class="row">
        <!-- Upload Form -->
        <div class="col-lg-5 col-md-6">
          <div class="detail-box">
            <h2>Upload Image</h2>
            <form id="uploadForm" enctype="multipart/form-data">
              <input type="file" id="imageInput" name="image" accept="image/*" required>
              <br><br>
              <button type="submit" class="btn btn-primary">Upload</button>
            </form>
          </div>
        </div>

        <!-- Image Display and Result -->
        <div class="col-lg-7 col-md-6">
          <div class="img-box">
            <img id="imagePreview" src="{{ url_for('static', filename='images/3129492.jpg') }}" alt="Uploaded Image" style="width: 100%;">
          </div>

          <div class="result-box" style="margin-top: 20px;">
            <h4>Result:</h4>
            <p id="modelOutput">Your model output will appear here after processing.</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- JavaScript -->
  <script>
    document.getElementById("uploadForm").addEventListener("submit", function (event) {
      event.preventDefault();

      const input = document.getElementById("imageInput");
      const preview = document.getElementById("imagePreview");
      const modelOutput = document.getElementById("modelOutput");

      if (input.files && input.files[0]) {
        const formData = new FormData();
        formData.append("image", input.files[0]);

        // Preview the image
        const reader = new FileReader();
        reader.onload = function (e) {
          preview.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);

        modelOutput.innerHTML = "Processing image...";

        fetch("/process_claim", {
          method: "POST",
          body: formData
        })
        .then(response => response.json())
        .then(data => {
          modelOutput.innerHTML = `<h5>Estimated Claim Amount: ₹${data.claim_amount}</h5>
                                   <p>Damaged Parts: ${data.parts.join(", ")}</p>`;
        })
        .catch(error => {
          console.error("Error:", error);
          modelOutput.innerHTML = "An error occurred during processing.";
        });
      }
    });
  </script>


  
  
  


  <!-- end about section -->



  <!-- info section -->
  <section class="info_section ">
    <div class="social-box">
      <h4>
        AutoFix
      </h4>
    </div>
  </section>



  <!-- end info_section -->

  <!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

<!-- jQuery (must come before Bootstrap JS) -->
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

<!-- Owl Carousel JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>

<!-- Google Maps API -->
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCh39n5U-4IoWpsVGUHWdqB6puEkhRLdmI&callback=myMap">
</script>


</body>

</html>
